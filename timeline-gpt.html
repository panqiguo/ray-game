<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多线叙事 Timeline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#f7f7f4;
  --ink:#1d1d1f;
  --muted:#777;
  --line:#d8d6cf;
  --soft:#ffffffcc;
  --cell:#fff;
  --shadow:0 10px 28px rgba(36,34,30,.08);
}
body{
  min-width:1500px;
  color:var(--ink);
  background:
    linear-gradient(rgba(247,247,244,.92),rgba(247,247,244,.92)),
    radial-gradient(circle,#cac7bd 1px,transparent 1px);
  background-size:auto,22px 22px;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;
  padding:34px 34px 70px;
}
.page-head{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:28px;
  margin-bottom:22px;
}
.kicker{
  font-size:12px;
  color:#8d877c;
  letter-spacing:.08em;
  margin-bottom:7px;
}
h1{
  font-size:26px;
  font-weight:650;
  letter-spacing:0;
}
.page-note{
  max-width:620px;
  color:#68645d;
  font-size:13px;
  line-height:1.75;
  text-align:right;
}
.legend{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:18px;
}
.tag{
  display:inline-flex;
  align-items:center;
  min-height:20px;
  padding:2px 7px;
  border-radius:5px;
  background:#ece9df;
  color:#5e584f;
  font-size:11px;
  font-weight:600;
  white-space:nowrap;
}
.tag.challenge{background:#f0d56a;color:#5a4300}
.tag.merge{background:#c9e2d3;color:#24593b}
.tag.choice{background:#d8d3f6;color:#47388b}
.tag.branch{background:#d9e8ee;color:#28576a}
.tag.pressure{background:#edd2cc;color:#8d2f23}
.board{
  display:grid;
  gap:12px;
  align-items:stretch;
}
.corner,
.lane-head,
.chapter,
.cell{
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--soft);
}
.corner{
  min-height:118px;
  padding:14px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  color:#817b70;
  font-size:12px;
  line-height:1.55;
}
.lane-head{
  min-height:118px;
  padding:15px 15px 14px;
  position:relative;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.lane-head:before{
  content:"";
  position:absolute;
  left:0;
  right:0;
  top:0;
  height:5px;
  background:var(--accent);
}
.lane-title{
  font-size:16px;
  font-weight:650;
  margin-bottom:6px;
}
.lane-sub{
  font-size:12px;
  color:#77736a;
  line-height:1.55;
}
.lane-type{
  margin-top:12px;
  display:inline-flex;
  color:#fff;
  background:var(--accent);
  border-radius:5px;
  padding:3px 7px;
  font-size:11px;
  font-weight:650;
}
.chapter{
  padding:14px;
  min-height:190px;
  background:#fdfcf8;
  display:flex;
  flex-direction:column;
  gap:12px;
  border-style:dashed;
}
.chapter-label{
  color:#8d877c;
  font-size:12px;
  font-weight:650;
}
.chapter-title{
  font-size:19px;
  font-weight:700;
}
.chapter-days{
  color:#7f796d;
  font-size:12px;
}
.locs{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:auto;
}
.loc{
  border:1px solid #d8d3c6;
  background:#f1eee6;
  color:#6f675c;
  border-radius:5px;
  padding:4px 7px;
  font-size:11px;
  font-weight:600;
}
.cell{
  min-height:190px;
  padding:14px 14px 13px;
  background:var(--cell);
  position:relative;
}
.cell.active{
  border-color:color-mix(in srgb,var(--accent) 48%,#d8d6cf);
}
.cell.merge{
  background:linear-gradient(135deg,#fff 0%,#fff 56%,color-mix(in srgb,var(--accent) 11%,#fff) 100%);
}
.cell.dormant{
  background:#f1f0ec;
  color:#9b968b;
  border-style:dashed;
}
.cell-title{
  font-size:13px;
  color:#5f5a52;
  font-weight:700;
  margin-bottom:8px;
}
.cell.dormant .cell-title{color:#9b968b}
.beats{
  list-style:none;
  display:flex;
  flex-direction:column;
  gap:7px;
}
.beats li{
  display:flex;
  gap:7px;
  align-items:flex-start;
  font-size:12.5px;
  line-height:1.55;
  color:#33312d;
}
.cell.dormant .beats li{color:#9b968b}
.dot{
  width:5px;
  height:5px;
  border-radius:50%;
  background:var(--accent);
  margin-top:7px;
  flex:0 0 auto;
  opacity:.8;
}
.beat-text{
  min-width:0;
}
.beat-text .tag{
  margin-right:5px;
  vertical-align:1px;
}
.beat-title{
  display:inline;
  font-weight:650;
  color:#26231f;
}
.beat-note{
  display:block;
  margin-top:2px;
  color:#777168;
  font-size:11.5px;
  line-height:1.55;
}
.note{
  margin-top:10px;
  padding-top:9px;
  border-top:1px dashed #ddd8cd;
  color:#777168;
  font-size:11.5px;
  line-height:1.6;
}
.dormant .note{border-top-color:#dedbd3;color:#999389}
.footer-note{
  margin-top:18px;
  color:#7a756c;
  font-size:12px;
  line-height:1.7;
}
@media print{
  body{padding:18px;min-width:0;background:#fff}
  .board{gap:8px}
  .lane-head,.cell{box-shadow:none}
}
</style>
</head>
<body>
<header class="page-head">
  <div>
    <div class="kicker">STORYLINE BOARD</div>
    <h1>科尔事件簿 · 多线叙事 Timeline</h1>
  </div>
  <p class="page-note">
    横向每一列是一条独立推进的故事线，纵向每一行是章节阶段。节点只写推进目标或场景纲要，用来检查每条线何时开启、并线、收束。
  </p>
</header>

<div class="legend">
  <span class="tag challenge">挑战场景</span>
  <span class="tag merge">并线</span>
  <span class="tag choice">选择</span>
  <span class="tag branch">支线</span>
  <span class="tag pressure">压力</span>
</div>

<main id="board" class="board"></main>

<p class="footer-note">
  设计备注：中枪男人线是序章引爆点，薇拉委托线是第一条长主线；两者在第三、四章通过神秘物品与红房间案正式合流。金发女人和赌徒男人从老街区开启，持续到第三或第四章，之后以资源、证词、通道或缺席的形式影响后续。
</p>

<script>
const lanes = [
  {
    id:"intruder",
    title:"中枪男人",
    subtitle:"序章线 · 神秘物品 · 被盯上的办公室",
    type:"引爆线",
    accent:"#7b61d1"
  },
  {
    id:"vera",
    title:"薇拉 / 弗雷德里克",
    subtitle:"委托、追猎、倾斜、反转，是整章情感和误判的核心",
    type:"主线",
    accent:"#c45b50"
  },
  {
    id:"redroom",
    title:"红房间 / 城市权力",
    subtitle:"从街头债务、警察压力到上层系统的真实形状",
    type:"世界线",
    accent:"#3c7f88"
  },
  {
    id:"blonde",
    title:"酒吧金发女人",
    subtitle:"老街开启的隐秘侧面，提供玛丽·贝尔和幸存者方向",
    type:"人物支线",
    accent:"#d29525"
  },
  {
    id:"gambler",
    title:"赌徒男人",
    subtitle:"老街开启的地下入口，连接赌局、债务、假证件与通道",
    type:"人物支线",
    accent:"#4f8e55"
  }
];

const task = (title,note="",tag=null) => ({title,note,tag});

const chapters = [
  {
    label:"序章",
    title:"闯入",
    days:"开场夜",
    locations:["办公室","诊所","雷奥"],
    cells:{
      intruder:{
        title:"取回神秘物品",
        beats:[
          task("5天内取回中枪男人留下的东西","中枪男人突然闯入办公室，死前把神秘物品交到科尔手里。有人会来找它，科尔必须决定藏在哪里、交给谁鉴定。","压力"),
          task("处理办公室闯入现场","清理血迹、尸体、邻居目击和可能的报警风险，让普通生活的外壳暂时维持下去。"),
          task("把物品送去鉴定","找雷奥或其他可信线人，换取第一个模糊方向：名字、编号或旧案痕迹。")
        ]
      },
      vera:{
        title:"尚未接入",
        dormant:true,
        beats:[
          task("等待委托触发","薇拉此时还只是城市另一端的失踪者，弗雷德里克尚未进入科尔视野。")
        ]
      },
      redroom:{
        title:"确认自己被盯上",
        beats:[
          task("处理黑帮债务倒计时","讨债人上门，把科尔的时间压力钉在桌面上。","压力"),
          task("查清谁在打听科尔","房东、邻居或旧联系人透露：有人在问办公室和中枪男人的事。")
        ]
      },
      blonde:{
        title:"未开启",
        dormant:true,
        beats:[task("等待老街区解锁","酒吧与金发女人支线暂不出现。")]
      },
      gambler:{
        title:"未开启",
        dormant:true,
        beats:[task("等待老街区解锁","地下赌局与赌徒男人支线暂不出现。")]
      }
    }
  },
  {
    label:"第一章",
    title:"卷入",
    days:"Day 1-4",
    locations:["中心区","公寓","书店","饭馆"],
    cells:{
      intruder:{
        title:"追查神秘物品",
        beats:[
          task("检查闯入者遗留线索","从衣物、弹孔、血迹和随身物里找出他从哪里来。"),
          task("确认翻办公室的人","有人已经来找过同一件东西，科尔需要判断对方是黑帮、警察还是更隐秘的人。"),
          task("联系旧同僚追问案卷编号","旧同僚不想说话，但他的恐惧本身就是线索。"),
          task("在时限前锁定物品指向谁","对方给出5天压力，玩家要推进到一个可行动的名字或地点。","压力")
        ],
        note:"这一列的节点都应该像任务：取物、鉴定、追问、锁定方向；情节只作为任务备注出现。"
      },
      vera:{
        title:"接下寻找薇拉的委托",
        beats:[
          task("接下弗雷德里克的委托","他以疲惫丈夫姿态出现，报酬足够让科尔暂时忽略不对劲。"),
          task("调查薇拉基础资料","整理照片、病历说法、婚姻关系、失踪时间线。"),
          task("走访薇拉最后出现地点","比对她接触过的人、留下的物和被删除的记录。"),
          task("判断跟踪者冲谁而来","科尔开始被跟踪，但还不知道对方是冲薇拉，还是冲神秘物品。")
        ]
      },
      redroom:{
        title:"维持城市表层生活",
        beats:[
          task("规划债务前的行动窗口","黑帮债务限制行动天数，也逼玩家选择优先查哪条线。","压力"),
          task("建立可用人脉","书店、饭馆、诊所等地点提供普通生活层面的线索与资源。"),
          task("确认警察和财阀只是远影","第一章只让玩家看到影子，不急着解释上层结构。")
        ]
      },
      blonde:{
        title:"未开启",
        dormant:true,
        beats:[task("等待老街区解锁","她的故事线从第二章酒吧开放后开始。")]
      },
      gambler:{
        title:"未开启",
        dormant:true,
        beats:[task("等待老街区解锁","他的故事线从第二章老街和地下赌局开放后开始。")]
      }
    }
  },
  {
    label:"第二章",
    title:"追猎",
    days:"Day 5-8",
    locations:["老街","旅馆","酒吧","废弃区"],
    cells:{
      intruder:{
        title:"把物品线接到薇拉线",
        beats:[
          task("领取雷奥的初步鉴定","鉴定只给出模糊结果：名字、编号或旧案痕迹。"),
          task("比对物品与薇拉逃亡路线","玩家发现物品指向的地点，和薇拉正在靠近的地方有重叠。"),
          task("提出两案关联假设","这不是结论，只是让两条线第一次并排进入玩家脑中。","并线")
        ],
        merge:true
      },
      vera:{
        title:"从委托进入追猎",
        beats:[
          task("调查薇拉相关资料","确认她不是漫无目的地逃，而是在沿某条线索移动。"),
          task("锁定旅馆并尝试调查","旅馆是第一个明确落点，玩家要决定正面询问还是绕开前台。"),
          task("潜入旅馆","避开另一拨追猎者，搜索房间、账本和被匆忙留下的东西。","挑战场景"),
          task("逼问旅馆线索","从员工、邻房客或旧联系人口中拿到下一站。"),
          task("跟踪薇拉逃亡路线","她在找什么这个疑问，开始比完成委托更重要。"),
          task("处理首次对抗","她握着武器，不相信任何人；玩家要在制服、谈判、放走之间处理。"),
          task("帮助薇拉暂时躲开追捕","科尔第一次偏离完成任务的轨道。","选择")
        ]
      },
      redroom:{
        title:"识别另一个猎人",
        beats:[
          task("调查先到一步的人","科尔扑空不是因为慢，而是有另一拨人也在追她。"),
          task("打开老街消息渠道","玩家接触酒吧、废弃区和地下线人，城市背面的信息开始流动。"),
          task("记录红房间改名痕迹","此时它仍是传闻，但名字、地址和人员开始反复出现。")
        ]
      },
      blonde:{
        title:"开启酒吧金发女人支线",
        beats:[
          task("在老街酒吧接触金发女人","她用玩笑和交易试探科尔，不直接给答案。","支线"),
          task("替她处理跟踪者","小型街头场景，换取她愿意继续谈。"),
          task("打听玛丽·贝尔的只言片语","她认识某个幸存者，也知道玛丽不是档案里那种人。"),
          task("决定关系基调","信任、交易或互相利用，会影响第三章她给多少东西。","选择")
        ],
        note:"她的任务不是解主线谜题，而是从隐秘角度让玩家理解这个世界。"
      },
      gambler:{
        title:"开启赌徒男人支线",
        beats:[
          task("在老街救下或抓住赌徒男人","他正被追债，玩家可帮他、利用他或当场交易。","支线"),
          task("追问地下赌局入口","他知道假证件、旧楼通道和某些人脉。"),
          task("处理他的当晚麻烦","小型外出或城市行动，决定他是否愿意带路。"),
          task("记录他的离城倒计时","他的线不会贯穿全章，核心是短时间内决定他留下还是逃。")
        ]
      }
    }
  },
  {
    label:"第三章",
    title:"倾斜",
    days:"Day 9-12",
    locations:["旧书店","安全屋","档案室","警局外围"],
    cells:{
      intruder:{
        title:"把神秘物品并入旧案",
        beats:[
          task("查到物品对应的旧案卷","神秘物品指向红房间相关案卷，序章线正式并入旧案。","并线"),
          task("让雷奥确认交叉人物","弗雷德里克、玛丽·贝尔或某个旧调查员进入同一张关系网。"),
          task("暂存无法深追的疑问","玩家知道它重要，但眼下必须先处理薇拉和弗雷德里克。")
        ],
        merge:true
      },
      vera:{
        title:"休战、藏匿、验证",
        beats:[
          task("为薇拉安排藏身处","旧书店、安全屋或多琳的地方，让她短暂离开追捕。"),
          task("听取薇拉关于弗雷德里克的陈述","她讲控制、入院评估和医生压力，但没有说完整真相。"),
          task("调查入院评估文件","玩家要验证她说出的那部分是否真实。"),
          task("调查玛丽·贝尔旧案","旧案被草草结案，玩家开始情感上偏向薇拉。"),
          task("替薇拉寻找指定文件或证人","看似受害者求助，其实也是她计划的一部分。"),
          task("向弗雷德里克隐瞒进度","科尔报告还没找到，正式站到委托之外。","选择")
        ],
        note:"这一章的每个点都要能落成调查、对话或外出行动；薇拉的讲述只是任务里的备注和奖励。"
      },
      redroom:{
        title:"验证红房间结构",
        beats:[
          task("查警局旧案撤销记录","确认旧案不是自然结束，而是被压下去。"),
          task("追踪医疗系统接口","康复中心、医生、评估文件让红房间开始具备现实形状。"),
          task("标记上层人物入口","玩家第一次看到财阀、警局和红房间之间的结构性连接。")
        ]
      },
      blonde:{
        title:"推进玛丽·贝尔支线",
        beats:[
          task("向金发女人追问玛丽生前关系","她给出的不是证据，而是玛丽作为人的侧影。"),
          task("保护她的联系人","酒吧后巷摆脱盯梢者，换取幸存者线索。","挑战场景"),
          task("取得幸存者可能下落","她要求科尔先证明自己不是又一个利用她们的人。"),
          task("确定支线信任状态","信任、欠人情或冷淡收束，决定第四章她是否出面。","选择")
        ]
      },
      gambler:{
        title:"取得地下入口资源",
        beats:[
          task("让赌徒带路进入地下赌局","玩家可以用钱、人情或威胁换取入口。"),
          task("获取假证件或秘密通道","这条支线提供工具，不提供主线真相。"),
          task("处理他的离城请求","他问科尔：留下真的有用吗。"),
          task("决定他是否还有用","让他跑、逼他留下，或给他一次做对事的机会。","选择")
        ]
      }
    }
  },
  {
    label:"第四章",
    title:"暗流",
    days:"Day 13-15",
    locations:["康复中心外围","工业废区","旧会议点"],
    cells:{
      intruder:{
        title:"把中枪男人转为证据链",
        beats:[

const tagClass = {
  "挑战场景":"challenge",
  "并线":"merge",
  "选择":"choice",
  "支线":"branch",
  "压力":"pressure"
};

function makeEl(tag, className, text){
  const el = document.createElement(tag);
  if(className) el.className = className;
  if(text) el.textContent = text;
  return el;
}

function normalizeBeat(beat){
  if(Array.isArray(beat)) return {tag:beat[0],title:beat[1],note:""};
  return beat;
}

function renderBeat(rawBeat, accent){
  const beat = normalizeBeat(rawBeat);
  const li = makeEl("li");
  const dot = makeEl("span","dot");
  dot.style.background = accent;
  const text = makeEl("span","beat-text");
  if(beat.tag){
    const tag = makeEl("span",`tag ${tagClass[beat.tag] || ""}`,beat.tag);
    text.appendChild(tag);
  }
  text.appendChild(makeEl("span","beat-title",beat.title));
  if(beat.note) text.appendChild(makeEl("span","beat-note",beat.note));
  li.append(dot,text);
  return li;
}

function renderBoard(){
  const board = document.getElementById("board");
  board.style.gridTemplateColumns = `150px repeat(${lanes.length}, minmax(230px, 1fr))`;

  const corner = makeEl("div","corner");
  corner.innerHTML = "<strong>章节阶段</strong><br>地点解锁与故事压力按行推进";
  board.appendChild(corner);

  for(const lane of lanes){
    const head = makeEl("section","lane-head");
    head.style.setProperty("--accent",lane.accent);
    head.append(
      makeEl("div","lane-title",lane.title),
      makeEl("div","lane-sub",lane.subtitle),
      makeEl("div","lane-type",lane.type)
    );
    board.appendChild(head);
  }

  for(const chapter of chapters){
    const chapterCell = makeEl("section","chapter");
    chapterCell.innerHTML = `
      <div>
        <div class="chapter-label">${chapter.label}</div>
        <div class="chapter-title">${chapter.title}</div>
        <div class="chapter-days">${chapter.days}</div>
      </div>
      <div class="locs">${chapter.locations.map(loc => `<span class="loc">${loc}</span>`).join("")}</div>
    `;
    board.appendChild(chapterCell);

    for(const lane of lanes){
      const data = chapter.cells[lane.id] || {
        title:"空窗",
        dormant:true,
        beats:[task("这一阶段没有推进")]
      };
      const cell = makeEl("section","cell");
      cell.style.setProperty("--accent",lane.accent);
      if(data.dormant) cell.classList.add("dormant");
      else cell.classList.add("active");
      if(data.merge) cell.classList.add("merge");

      cell.appendChild(makeEl("div","cell-title",data.title));
      const ul = makeEl("ul","beats");
      for(const beat of data.beats) ul.appendChild(renderBeat(beat,lane.accent));
      cell.appendChild(ul);
      if(data.note) cell.appendChild(makeEl("div","note",data.note));
      board.appendChild(cell);
    }
  }
}

renderBoard();
